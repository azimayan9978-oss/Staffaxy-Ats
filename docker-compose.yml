services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ats}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in your .env file}
      POSTGRES_DB: ${POSTGRES_DB:-ats}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ats} -d ${POSTGRES_DB:-ats}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api-server:
    build:
      context: .
      dockerfile: deploy/api-server.Dockerfile
    restart: unless-stopped
    environment:
      PORT: "8080"
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in your .env file}
      DATABASE_URL: postgres://${POSTGRES_USER:-ats}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ats}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: deploy/web.Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      api-server:
        condition: service_healthy

  # One-off job to push the Drizzle schema to Postgres. Not started by
  # `docker compose up`; run explicitly:
  #   docker compose run --rm migrate
  migrate:
    build:
      context: .
      dockerfile: deploy/api-server.Dockerfile
      target: build
    profiles: ["tools"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-ats}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ats}
    command: ["pnpm", "--filter", "@workspace/db", "run", "push"]
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:

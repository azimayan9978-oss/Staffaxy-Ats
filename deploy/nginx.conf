server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy to the api-server container (same-origin from the
    # browser's point of view, so cookies and the relative "/api/..."
    # calls made by the frontend work without any extra config).
    location /api/ {
        proxy_pass http://api-server:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Cache hashed static assets aggressively.
    location ~* \.(?:css|js|svg|jpg|jpeg|png|gif|ico|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: client-side router (wouter) handles the route.
    location / {
        try_files $uri /index.html;
    }
}
